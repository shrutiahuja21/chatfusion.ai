version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chatfusion_postgres
    environment:
      POSTGRES_USER: chatfusion_user
      POSTGRES_PASSWORD: chatfusion_password
      POSTGRES_DB: chatfusion_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: chatfusion_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chatfusion.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: always

  backend:
    build: 
      context: ./backend
    container_name: chatfusion_backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://chatfusion_user:chatfusion_password@db:5432/chatfusion_db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      - db
    restart: always

  frontend:
    build: 
      context: ./frontend
    container_name: chatfusion_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
