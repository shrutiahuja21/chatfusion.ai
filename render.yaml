services:
  # FastAPI Backend
  - type: web
    name: chatfusion-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker -w 4 backend.main:app -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chatfusion-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: chatfusion-db
    plan: free
