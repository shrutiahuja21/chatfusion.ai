name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          
      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    # uncomment and configure secrets
    # if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Compose Stack
        run: |
          docker-compose build
          
